<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 Controle Financeiro</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e;
  --paper: #f5f0e8;
  --cream: #ede8dc;
  --gold: #c9a84c;
  --gold-light: #f0d98a;
  --green: #2d6a4f;
  --green-light: #95d5b2;
  --red: #9b2335;
  --red-light: #f4a0a8;
  --blue: #1d4e89;
  --blue-light: #a8c4e0;
  --purple: #5c4b8a;
  --border: rgba(26,26,46,0.12);
  --shadow: 0 4px 24px rgba(26,26,46,0.10);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Plus Jakarta Sans', sans-serif;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 50% at 10% 0%, rgba(201,168,76,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 90% 100%, rgba(45,106,79,0.06) 0%, transparent 60%);
}

.app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 100px; }

/* ── HEADER ── */
.header {
  background: var(--ink);
  padding: 28px 24px 20px;
  position: sticky; top: 0; z-index: 50;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.logo { font-family: 'Fraunces', serif; font-size: 1.5rem; color: var(--gold-light); letter-spacing: -0.5px; }
.logo span { color: #fff; }
.month-pill {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 99px; padding: 5px 14px;
  font-size: 0.75rem; color: rgba(255,255,255,0.7);
  font-weight: 500;
}

/* CARDS HEADER */
.header-cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.hcard {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px; padding: 12px;
}
.hcard-label { font-size: 0.65rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.hcard-val { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 700; }
.hcard.income .hcard-val { color: var(--green-light); }
.hcard.expense .hcard-val { color: var(--red-light); }
.hcard.balance .hcard-val { color: var(--gold-light); }

/* ── TABS ── */
.tabs {
  display: flex; background: var(--cream);
  border-bottom: 2px solid var(--border);
  position: sticky; top: 148px; z-index: 40;
}
.tab {
  flex: 1; padding: 14px 4px; text-align: center;
  font-size: 0.72rem; font-weight: 600; color: rgba(26,26,46,0.45);
  border: none; background: none; cursor: pointer;
  text-transform: uppercase; letter-spacing: 0.8px;
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: all 0.2s;
}
.tab.on { color: var(--ink); border-bottom-color: var(--gold); }

/* ── PAGES ── */
.page { display: none; padding: 20px 16px; animation: fadeUp 0.2s ease; }
.page.on { display: block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ── FORM CARD ── */
.form-card {
  background: #fff;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.form-title {
  font-family: 'Fraunces', serif;
  font-size: 1.1rem; font-weight: 700;
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}

.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 0.7rem; font-weight: 600;
  color: rgba(26,26,46,0.5); text-transform: uppercase;
  letter-spacing: 0.8px; margin-bottom: 5px;
}
.field input, .field select {
  width: 100%; background: var(--paper);
  border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--ink);
  padding: 11px 13px; font-size: 0.92rem;
  font-family: 'Plus Jakarta Sans', sans-serif;
  outline: none; transition: border-color 0.2s;
  -webkit-appearance: none;
}
.field input:focus, .field select:focus { border-color: var(--gold); }
.field select option { background: #fff; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* BUTTONS */
.btn {
  width: 100%; padding: 14px; border: none; border-radius: 12px;
  font-family: 'Fraunces', serif; font-weight: 700; font-size: 1rem;
  cursor: pointer; transition: all 0.18s; letter-spacing: 0.3px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-expense { background: var(--ink); color: var(--gold-light); }
.btn-expense:hover { background: #2d2d4e; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(26,26,46,0.2); }
.btn-income { background: var(--green); color: #fff; }
.btn-income:hover { background: #1f4f38; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(45,106,79,0.3); }
.btn:active { transform: scale(0.98); }

/* ── LIST ── */
.list-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px; padding: 0 4px;
}
.list-title { font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 700; }
.list-total { font-size: 0.8rem; font-weight: 600; color: var(--gold); }

.day-group { margin-bottom: 16px; }
.day-label {
  font-size: 0.68rem; font-weight: 600; color: rgba(26,26,46,0.4);
  text-transform: uppercase; letter-spacing: 1px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px; padding: 0 4px;
}
.day-label span { color: var(--gold); font-weight: 700; }

.item {
  background: #fff; border-radius: 14px; padding: 13px 14px;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 8px; box-shadow: 0 2px 8px rgba(26,26,46,0.06);
  border: 1px solid var(--border);
  animation: slideIn 0.2s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
.item-icon {
  width: 40px; height: 40px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; flex-shrink: 0;
}
.item-info { flex: 1; min-width: 0; }
.item-desc { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-meta { font-size: 0.7rem; color: rgba(26,26,46,0.45); margin-top: 2px; }
.item-right { text-align: right; flex-shrink: 0; }
.item-val { font-family: 'Fraunces', serif; font-size: 0.95rem; font-weight: 700; }
.item-val.exp { color: var(--red); }
.item-val.inc { color: var(--green); }
.btn-del {
  background: none; border: none; color: rgba(26,26,46,0.2);
  font-size: 0.85rem; cursor: pointer; padding: 2px 4px; margin-top: 2px;
  transition: color 0.2s;
}
.btn-del:hover { color: var(--red); }

/* ── RESUMO ── */
.section-title {
  font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 700;
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.cat-card {
  background: #fff; border-radius: 14px; padding: 14px 16px;
  margin-bottom: 10px; box-shadow: 0 2px 8px rgba(26,26,46,0.05);
  border: 1px solid var(--border);
}
.cat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
.cat-name { font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 7px; }
.cat-amount { font-family: 'Fraunces', serif; font-size: 0.9rem; font-weight: 700; color: var(--red); }
.bar-track { height: 5px; background: var(--cream); border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }

/* DONUT */
.donut-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 10px 0 20px; }
.donut { width: 160px; height: 160px; border-radius: 50%; position: relative; }
.donut-center {
  position: absolute; inset: 32px; background: #fff; border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  box-shadow: inset 0 2px 8px rgba(26,26,46,0.08);
}
.donut-lbl { font-size: 0.6rem; color: rgba(26,26,46,0.4); text-transform: uppercase; letter-spacing: 1px; }
.donut-val { font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 700; color: var(--ink); }
.legend { display: flex; flex-wrap: wrap; gap: 8px 16px; justify-content: center; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 0.73rem; color: rgba(26,26,46,0.6); }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* RENDA vs GASTOS */
.balance-card {
  background: var(--ink); border-radius: 20px; padding: 20px;
  margin-bottom: 16px; color: #fff;
}
.balance-title { font-family: 'Fraunces', serif; font-size: 1rem; color: var(--gold-light); margin-bottom: 16px; }
.balance-bar-labels { display: flex; justify-content: space-between; font-size: 0.72rem; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
.balance-bar-track { height: 10px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; }
.balance-bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s; }
.balance-nums { display: flex; justify-content: space-between; margin-top: 12px; }
.balance-num { text-align: center; }
.balance-num-val { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 700; }
.balance-num-lbl { font-size: 0.65rem; color: rgba(255,255,255,0.4); margin-top: 2px; }

/* ORÇAMENTO */
.orc-card {
  background: #fff; border-radius: 14px; padding: 14px 16px;
  margin-bottom: 10px; box-shadow: 0 2px 8px rgba(26,26,46,0.05);
  border: 1px solid var(--border);
}
.orc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.orc-cat { font-size: 0.85rem; font-weight: 600; }
.tag { padding: 3px 9px; border-radius: 99px; font-size: 0.68rem; font-weight: 700; }
.tok { background: #d8f3dc; color: var(--green); }
.twarn { background: #fff3cd; color: #856404; }
.tover { background: #ffe0e3; color: var(--red); }
.orc-nums { display: flex; justify-content: space-between; font-size: 0.73rem; color: rgba(26,26,46,0.45); margin-bottom: 5px; }

/* EMPTY */
.empty { text-align: center; padding: 40px 20px; color: rgba(26,26,46,0.35); }
.empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
.empty-txt { font-size: 0.85rem; }

/* TOAST */
.toast {
  position: fixed; bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--ink); color: var(--gold-light);
  border-radius: 99px; padding: 11px 20px;
  font-size: 0.83rem; font-weight: 600;
  opacity: 0; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 999; white-space: nowrap;
  box-shadow: 0 8px 32px rgba(26,26,46,0.25);
}
.toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

/* BOTTOM NAV */
.nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: var(--ink); display: flex;
  padding: 10px 0 env(safe-area-inset-bottom, 10px);
  z-index: 50;
}
.nb {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 4px 2px; border: none; background: none;
  color: rgba(255,255,255,0.3); font-size: 0.6rem; font-family: 'Plus Jakarta Sans',sans-serif;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  cursor: pointer; transition: color 0.2s;
}
.nb .ic { font-size: 1.2rem; }
.nb.on { color: var(--gold-light); }

/* ORC MODAL */
.modal-bg {
  position: fixed; inset: 0; background: rgba(26,26,46,0.6);
  backdrop-filter: blur(4px); z-index: 100;
  display: none; align-items: flex-end; justify-content: center;
}
.modal-bg.on { display: flex; }
.modal {
  background: #fff; border-radius: 24px 24px 0 0;
  width: 100%; max-width: 480px; padding: 24px 20px 40px;
  max-height: 85vh; overflow-y: auto;
  animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 99px; margin: 0 auto 18px; }
.modal h2 { font-family: 'Fraunces', serif; font-size: 1.1rem; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 10px; margin-top: 18px; }
.btn-cancel { flex: 1; padding: 13px; background: var(--paper); color: rgba(26,26,46,0.5); border: 1.5px solid var(--border); border-radius: 12px; font-family: 'Fraunces',serif; font-weight: 700; cursor: pointer; }
.btn-save { flex: 2; padding: 13px; background: var(--ink); color: var(--gold-light); border: none; border-radius: 12px; font-family: 'Fraunces',serif; font-weight: 700; cursor: pointer; }

/* FILTER PILLS */
.pills { display: flex; gap: 7px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
.pills::-webkit-scrollbar { display: none; }
.pill {
  padding: 6px 14px; border-radius: 99px; font-size: 0.73rem; font-weight: 600;
  border: 1.5px solid var(--border); background: #fff; color: rgba(26,26,46,0.45);
  cursor: pointer; white-space: nowrap; transition: all 0.18s;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.pill.on { background: var(--ink); color: var(--gold-light); border-color: var(--ink); }

input[type=date]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo">dinheiro<span>.</span></div>
    <div class="month-pill" id="monthPill"></div>
  </div>
  <div class="header-cards">
    <div class="hcard income">
      <div class="hcard-label">Renda</div>
      <div class="hcard-val" id="hRenda">R$0</div>
    </div>
    <div class="hcard expense">
      <div class="hcard-label">Gastos</div>
      <div class="hcard-val" id="hGastos">R$0</div>
    </div>
    <div class="hcard balance">
      <div class="hcard-label">Saldo</div>
      <div class="hcard-val" id="hSaldo">R$0</div>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab on" onclick="goTab('tLancar',this)">＋ Lançar</button>
  <button class="tab" onclick="goTab('tHistorico',this)">Histórico</button>
  <button class="tab" onclick="goTab('tResumo',this)">Resumo</button>
  <button class="tab" onclick="goTab('tOrcamento',this)">Orçamento</button>
</div>

<div class="app">

  <!-- LANÇAR -->
  <div class="page on" id="tLancar">

    <!-- GASTO -->
    <div class="form-card">
      <div class="form-title">💸 Registrar Gasto</div>
      <div class="row2">
        <div class="field"><label>Data</label><input type="date" id="gData"></div>
        <div class="field"><label>Valor R$</label><input type="number" id="gValor" placeholder="0,00" step="0.01" inputmode="decimal"></div>
      </div>
      <div class="field"><label>Categoria</label>
        <select id="gCat">
          <option value="">Selecione...</option>
          <option>🛒 Mercado</option>
          <option>💧 Água</option>
          <option>⚡ Luz</option>
          <option>📡 Internet</option>
          <option>📱 Telefone</option>
          <option>💳 Cartão de Crédito</option>
          <option>🏠 Aluguel</option>
          <option>🚗 Transporte</option>
          <option>🏥 Saúde</option>
          <option>📚 Educação</option>
          <option>🎉 Lazer</option>
          <option>🍽️ Restaurante</option>
          <option>👗 Vestuário</option>
          <option>📦 Outros</option>
        </select>
      </div>
      <div class="field"><label>Forma de Pagamento</label>
        <select id="gPgto">
          <option value="">Selecione...</option>
          <option>💵 Dinheiro</option>
          <option>💳 Débito</option>
          <option>💳 Crédito</option>
          <option>📲 PIX</option>
          <option>📄 Boleto</option>
          <option>🔁 Transferência</option>
        </select>
      </div>
      <div class="field"><label>Descrição (opcional)</label>
        <input type="text" id="gDesc" placeholder="Ex: Feira, conta de luz...">
      </div>
      <button class="btn btn-expense" onclick="addGasto()">＋ Adicionar Gasto</button>
    </div>

    <!-- RENDA -->
    <div class="form-card">
      <div class="form-title">💰 Registrar Renda</div>
      <div class="row2">
        <div class="field"><label>Data</label><input type="date" id="rData"></div>
        <div class="field"><label>Valor R$</label><input type="number" id="rValor" placeholder="0,00" step="0.01" inputmode="decimal"></div>
      </div>
      <div class="field"><label>Tipo de Renda</label>
        <select id="rTipo">
          <option value="">Selecione...</option>
          <option>💼 Meu Salário</option>
          <option>💼 Salário Cônjuge</option>
          <option>📈 Freelance / Extra</option>
          <option>🏠 Aluguel Recebido</option>
          <option>💹 Investimentos</option>
          <option>🎁 Presente / Doação</option>
          <option>📦 Outros</option>
        </select>
      </div>
      <div class="field"><label>Descrição (opcional)</label>
        <input type="text" id="rDesc" placeholder="Ex: Salário março, bônus...">
      </div>
      <button class="btn btn-income" onclick="addRenda()">＋ Registrar Renda</button>
    </div>
  </div>

  <!-- HISTÓRICO -->
  <div class="page" id="tHistorico">
    <div class="pills">
      <button class="pill on" onclick="setFiltro('mes',this)">Este mês</button>
      <button class="pill" onclick="setFiltro('semana',this)">Esta semana</button>
      <button class="pill" onclick="setFiltro('hoje',this)">Hoje</button>
      <button class="pill" onclick="setFiltro('todos',this)">Todos</button>
    </div>
    <div id="histList"></div>
  </div>

  <!-- RESUMO -->
  <div class="page" id="tResumo">

    <div class="balance-card">
      <div class="balance-title">📊 Renda vs Gastos — Este Mês</div>
      <div class="balance-bar-labels">
        <span>Gastos <b id="bPctG" style="color:#f4a0a8">0%</b></span>
        <span>Sobra <b id="bPctS" style="color:#95d5b2">100%</b></span>
      </div>
      <div class="balance-bar-track">
        <div class="balance-bar-fill" id="bBarG" style="width:0%;background:linear-gradient(90deg,#c9a84c,#9b2335)"></div>
      </div>
      <div class="balance-nums">
        <div class="balance-num">
          <div class="balance-num-val" style="color:#95d5b2" id="bTotR">R$0</div>
          <div class="balance-num-lbl">Renda</div>
        </div>
        <div class="balance-num">
          <div class="balance-num-val" style="color:#f4a0a8" id="bTotG">R$0</div>
          <div class="balance-num-lbl">Gastos</div>
        </div>
        <div class="balance-num">
          <div class="balance-num-val" style="color:#f0d98a" id="bTotS">R$0</div>
          <div class="balance-num-lbl">Saldo</div>
        </div>
      </div>
    </div>

    <div class="form-card">
      <div class="section-title">🍩 Distribuição</div>
      <div class="donut-wrap">
        <div class="donut" id="donut">
          <div class="donut-center">
            <span class="donut-lbl">Total</span>
            <span class="donut-val" id="donutVal">R$0</span>
          </div>
        </div>
        <div class="legend" id="donutLeg"></div>
      </div>
    </div>

    <div class="section-title" style="padding:0 4px">📋 Por Categoria</div>
    <div id="catBars"></div>
  </div>

  <!-- ORÇAMENTO -->
  <div class="page" id="tOrcamento">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div class="section-title" style="margin:0">🎯 Orçamento Mensal</div>
      <button onclick="abrirOrc()" style="background:var(--ink);color:var(--gold-light);border:none;border-radius:10px;padding:8px 14px;font-family:'Fraunces',serif;font-weight:700;font-size:0.82rem;cursor:pointer;">✏️ Editar</button>
    </div>
    <div id="orcList"></div>
  </div>

</div><!-- /app -->

<!-- MODAL ORÇAMENTO -->
<div class="modal-bg" id="orcModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>🎯 Definir Orçamento</h2>
    <div id="orcForm"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="fecharOrc()">Cancelar</button>
      <button class="btn-save" onclick="salvarOrc()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════
// DADOS
// ═══════════════════════════════
let gastos  = JSON.parse(localStorage.getItem('din_gastos')  || '[]');
let rendas  = JSON.parse(localStorage.getItem('din_rendas')  || '[]');
let orc     = JSON.parse(localStorage.getItem('din_orc')     || '{}');
let filtro  = 'mes';

const CATS = ['🛒 Mercado','💧 Água','⚡ Luz','📡 Internet','📱 Telefone','💳 Cartão de Crédito','🏠 Aluguel','🚗 Transporte','🏥 Saúde','📚 Educação','🎉 Lazer','🍽️ Restaurante','👗 Vestuário','📦 Outros'];
const CORES = ['#e63946','#2196f3','#f4a261','#457b9d','#6a994e','#9b2335','#5c4b8a','#2d6a4f','#e76f51','#1d4e89','#c9a84c','#bc6c25','#8338ec','#6c757d'];

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('gData').valueAsDate = new Date();
  document.getElementById('rData').valueAsDate = new Date();
  document.getElementById('monthPill').textContent =
    new Date().toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  renderTudo();
});

function save() {
  localStorage.setItem('din_gastos', JSON.stringify(gastos));
  localStorage.setItem('din_rendas', JSON.stringify(rendas));
}

// ═══════════════════════════════
// ADD
// ═══════════════════════════════
function addGasto() {
  const data  = document.getElementById('gData').value;
  const valor = parseFloat(document.getElementById('gValor').value);
  const cat   = document.getElementById('gCat').value;
  const pgto  = document.getElementById('gPgto').value;
  const desc  = document.getElementById('gDesc').value.trim();
  if (!data || !valor || valor <= 0 || !cat) { toast('⚠️ Preencha data, valor e categoria'); return; }
  gastos.unshift({ id: Date.now(), data, valor, cat, pgto, desc, tipo: 'gasto' });
  save(); renderTudo();
  document.getElementById('gValor').value = '';
  document.getElementById('gCat').value = '';
  document.getElementById('gPgto').value = '';
  document.getElementById('gDesc').value = '';
  document.getElementById('gData').valueAsDate = new Date();
  toast('✅ Gasto adicionado!');
}

function addRenda() {
  const data  = document.getElementById('rData').value;
  const valor = parseFloat(document.getElementById('rValor').value);
  const tipo  = document.getElementById('rTipo').value;
  const desc  = document.getElementById('rDesc').value.trim();
  if (!data || !valor || valor <= 0 || !tipo) { toast('⚠️ Preencha data, valor e tipo'); return; }
  rendas.unshift({ id: Date.now(), data, valor, tipo, desc });
  save(); renderTudo();
  document.getElementById('rValor').value = '';
  document.getElementById('rTipo').value = '';
  document.getElementById('rDesc').value = '';
  document.getElementById('rData').valueAsDate = new Date();
  toast('💰 Renda registrada!');
}

function delGasto(id) {
  if (!confirm('Apagar?')) return;
  gastos = gastos.filter(e => e.id !== id);
  save(); renderTudo(); toast('🗑 Removido');
}
function delRenda(id) {
  if (!confirm('Apagar?')) return;
  rendas = rendas.filter(e => e.id !== id);
  save(); renderTudo(); toast('🗑 Removido');
}

// ═══════════════════════════════
// FILTRO
// ═══════════════════════════════
function setFiltro(f, btn) {
  filtro = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
  btn.classList.add('on');
  renderHistorico();
}

function getFiltrados() {
  const hoje = new Date().toISOString().slice(0,10);
  const semAgo = new Date(); semAgo.setDate(semAgo.getDate()-7);
  const mes = hoje.slice(0,7);
  return gastos.filter(e => {
    if (filtro==='hoje')   return e.data === hoje;
    if (filtro==='semana') return new Date(e.data) >= semAgo;
    if (filtro==='mes')    return e.data.slice(0,7) === mes;
    return true;
  });
}

// ═══════════════════════════════
// RENDER
// ═══════════════════════════════
function fmt(v) { return 'R$ ' + (v||0).toLocaleString('pt-BR',{minimumFractionDigits:2}); }
function fmtShort(v) { return v >= 1000 ? 'R$' + (v/1000).toFixed(1) + 'k' : 'R$' + Math.round(v); }

function renderTudo() {
  renderHeader();
  renderHistorico();
  renderResumo();
  renderOrcList();
}

function renderHeader() {
  const mes = new Date().toISOString().slice(0,7);
  const totG = gastos.filter(e=>e.data.slice(0,7)===mes).reduce((s,e)=>s+e.valor,0);
  const totR = rendas.filter(e=>e.data.slice(0,7)===mes).reduce((s,e)=>s+e.valor,0);
  const saldo = totR - totG;
  document.getElementById('hRenda').textContent  = fmtShort(totR);
  document.getElementById('hGastos').textContent = fmtShort(totG);
  document.getElementById('hSaldo').textContent  = fmtShort(saldo);
  document.getElementById('hSaldo').style.color  = saldo >= 0 ? 'var(--gold-light)' : 'var(--red-light)';
}

function renderHistorico() {
  const list = getFiltrados();
  const el = document.getElementById('histList');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-txt">Nenhum gasto neste período</div></div>';
    return;
  }
  const grupos = {};
  list.forEach(e => { if(!grupos[e.data]) grupos[e.data]=[]; grupos[e.data].push(e); });
  let html = '';
  Object.keys(grupos).sort((a,b)=>b.localeCompare(a)).forEach(d => {
    const lbl = new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'short'});
    const tot = grupos[d].reduce((s,e)=>s+e.valor,0);
    html += `<div class="day-group"><div class="day-label">${lbl} <span>${fmt(tot)}</span></div>`;
    html += grupos[d].map(e => itemHTML(e)).join('');
    html += '</div>';
  });
  el.innerHTML = html;
}

function itemHTML(e) {
  const ci = CATS.indexOf(e.cat);
  const cor = ci >= 0 ? CORES[ci] : '#6c757d';
  return `<div class="item">
    <div class="item-icon" style="background:${cor}18;color:${cor}">${(e.cat||'').split(' ')[0]}</div>
    <div class="item-info">
      <div class="item-desc">${e.desc || e.cat}</div>
      <div class="item-meta">${e.cat} · ${e.pgto||'—'}</div>
    </div>
    <div class="item-right">
      <div class="item-val exp">${fmt(e.valor)}</div>
      <button class="btn-del" onclick="delGasto(${e.id})">✕</button>
    </div>
  </div>`;
}

function renderResumo() {
  const mes = new Date().toISOString().slice(0,7);
  const mG = gastos.filter(e=>e.data.slice(0,7)===mes);
  const mR = rendas.filter(e=>e.data.slice(0,7)===mes);
  const totG = mG.reduce((s,e)=>s+e.valor,0);
  const totR = mR.reduce((s,e)=>s+e.valor,0);
  const saldo = totR - totG;
  const pct = totR > 0 ? Math.min(totG/totR,1) : 0;

  document.getElementById('bPctG').textContent = (pct*100).toFixed(0)+'%';
  document.getElementById('bPctS').textContent = ((1-pct)*100).toFixed(0)+'%';
  document.getElementById('bBarG').style.width = (pct*100)+'%';
  document.getElementById('bTotR').textContent = fmt(totR);
  document.getElementById('bTotG').textContent = fmt(totG);
  document.getElementById('bTotS').textContent = fmt(saldo);
  document.getElementById('bTotS').style.color = saldo >= 0 ? '#f0d98a' : '#f4a0a8';

  // Donut
  const tots = {};
  mG.forEach(e => { tots[e.cat] = (tots[e.cat]||0) + e.valor; });
  document.getElementById('donutVal').textContent = fmt(totG);
  const sorted = Object.entries(tots).sort((a,b)=>b[1]-a[1]);
  if (!totG) {
    document.getElementById('donut').style.background = 'conic-gradient(#e8e0d0 0% 100%)';
    document.getElementById('donutLeg').innerHTML = '';
    document.getElementById('catBars').innerHTML = '<div class="empty"><div class="empty-icon">📊</div><div class="empty-txt">Sem dados este mês</div></div>';
    return;
  }
  let deg=0, grad='', leg='', barsHtml='';
  const max = Math.max(...Object.values(tots),1);
  sorted.forEach(([cat,val]) => {
    const ci = CATS.indexOf(cat), cor = ci>=0?CORES[ci]:'#6c757d';
    const end = deg + (val/totG)*360;
    grad += `${cor} ${deg}deg ${end}deg, `; deg = end;
    leg += `<div class="leg-item"><div class="leg-dot" style="background:${cor}"></div>${cat.split(' ').slice(1).join(' ')}</div>`;
    barsHtml += `<div class="cat-card">
      <div class="cat-top">
        <div class="cat-name"><span style="font-size:1.1rem">${cat.split(' ')[0]}</span>${cat.split(' ').slice(1).join(' ')}</div>
        <div class="cat-amount">${fmt(val)}</div>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${(val/max*100).toFixed(1)}%;background:${cor}"></div></div>
    </div>`;
  });
  document.getElementById('donut').style.background = `conic-gradient(${grad.slice(0,-2)})`;
  document.getElementById('donut').style.borderRadius = '50%';
  document.getElementById('donutLeg').innerHTML = leg;
  document.getElementById('catBars').innerHTML = barsHtml;
}

function renderOrcList() {
  const mes = new Date().toISOString().slice(0,7);
  const tots = {};
  gastos.filter(e=>e.data.slice(0,7)===mes).forEach(e=>{ tots[e.cat]=(tots[e.cat]||0)+e.valor; });
  const cats = Object.keys(orc).filter(c=>orc[c]>0);
  if (!cats.length) {
    document.getElementById('orcList').innerHTML = '<div class="empty"><div class="empty-icon">🎯</div><div class="empty-txt">Toque em "Editar" para definir limites de gasto por categoria.</div></div>';
    return;
  }
  document.getElementById('orcList').innerHTML = cats.map(cat => {
    const lim=orc[cat], gasto=tots[cat]||0, pct=Math.min(gasto/lim,1);
    const ci=CATS.indexOf(cat), cor=ci>=0?CORES[ci]:'#6c757d';
    const tag = pct<.7?'<span class="tag tok">✓ OK</span>':pct<1?'<span class="tag twarn">⚠ Atenção</span>':'<span class="tag tover">🔴 Excedido</span>';
    return `<div class="orc-card">
      <div class="orc-top"><div class="orc-cat">${cat}</div>${tag}</div>
      <div class="orc-nums"><span>${fmt(gasto)} de ${fmt(lim)}</span><span>${(pct*100).toFixed(0)}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct*100}%;background:${cor}"></div></div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════
// ORÇAMENTO MODAL
// ═══════════════════════════════
function abrirOrc() {
  document.getElementById('orcForm').innerHTML = CATS.map(cat=>`
    <div class="field">
      <label>${cat}</label>
      <input type="number" placeholder="Limite mensal (R$)" value="${orc[cat]||''}" data-cat="${cat}" min="0" step="10" inputmode="decimal"
        style="width:100%;background:var(--paper);border:1.5px solid var(--border);border-radius:10px;color:var(--ink);padding:11px 13px;font-size:0.92rem;font-family:'Plus Jakarta Sans',sans-serif;outline:none;">
    </div>`).join('');
  document.getElementById('orcModal').classList.add('on');
}
function fecharOrc() { document.getElementById('orcModal').classList.remove('on'); }
function salvarOrc() {
  document.querySelectorAll('#orcForm input').forEach(i=>{ const v=parseFloat(i.value); if(v>0) orc[i.dataset.cat]=v; else delete orc[i.dataset.cat]; });
  localStorage.setItem('din_orc', JSON.stringify(orc));
  fecharOrc(); renderOrcList(); toast('🎯 Orçamento salvo!');
}
document.getElementById('orcModal').addEventListener('click', function(e){ if(e.target===this) fecharOrc(); });

// ═══════════════════════════════
// TABS
// ═══════════════════════════════
function goTab(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  btn.classList.add('on');
  window.scrollTo(0,0);
  if (id==='tResumo') renderResumo();
  if (id==='tOrcamento') renderOrcList();
}

// ═══════════════════════════════
// TOAST
// ═══════════════════════════════
let tt;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(tt); tt = setTimeout(()=>t.classList.remove('on'), 2600);
}
</script>
</body>
</html>
