<script>
const fbConfig={

authDomain:"gastos-familia-e8c60.firebaseapp.com",
databaseURL:"https://gastos-familia-e8c60-default-rtdb.firebaseio.com",

messagingSenderId:"1064154742925",
appId:"1:1064154742925:web:6873f79d57064ab7afa2c4"
};

let db,gastos=[],rendas=[],orcamento={},userName='',roomCode='',filtro='mes';
let gastosLoaded=false,rendasLoaded=false,appIniciado=false,timeoutConexao=null;

const CATS=['🛒 Mercado','💧 Água','⚡ Luz','📡 Internet','📱 Telefone','💳 Cartão de Crédito','🏠 Aluguel','🚗 Transporte','🏥 Saúde','📚 Educação','🎉 Lazer','🍽️ Restaurante','👗 Vestuário','📦 Outros'];
const CORES=['#7c6ef7','#f7c06e','#6ef7b8','#f76e6e','#6ec4f7','#c46ef7','#f7906e','#6ef7e8','#f76eb8','#a8f76e','#f7e66e','#6e8af7','#f7a06e','#b0b0c8'];

function entrar(){
  const name=document.getElementById('sName').value.trim();
  const room=document.getElementById('sRoom').value.trim().toLowerCase().replace(/\s+/g,'-');
  const err=document.getElementById('errMsg');

  if(!name){err.textContent='⚠️ Digite seu nome!';err.style.display='block';return;}
  if(!room){err.textContent='⚠️ Digite o código!';err.style.display='block';return;}

  err.style.display='none';
  userName=name;
  roomCode=room;

  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('greet').textContent=userName;
  document.getElementById('roomBadge').textContent=roomCode;

  if(!firebase.apps.length)firebase.initializeApp(fbConfig);
  db=firebase.database();

  db.ref('rooms/'+roomCode+'/gastos').on('value',snap=>{
    gastos=[];
    snap.forEach(c=>gastos.push({id:c.key,...c.val()}));
    gastos.sort((a,b)=>(b.ts||0)-(a.ts||0));
    renderTudo();
  });

  db.ref('rooms/'+roomCode+'/rendas').on('value',snap=>{
    rendas=[];
    snap.forEach(c=>rendas.push({id:c.key,...c.val()}));
    rendas.sort((a,b)=>(b.ts||0)-(a.ts||0));
    renderTudo();
  });
}

function fmt(v){
  return 'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
}

function renderTudo(){
  renderHome();
}

function renderHome(){
  const total=gastos.reduce((s,e)=>s+(e.valor||0),0);
  document.getElementById('hTotal').textContent=fmt(total);
  document.getElementById('hCount').textContent=gastos.length+' lançamentos';

  const el=document.getElementById('homeList');

  if(!gastos.length){
    el.innerHTML=`<div class="empty">
      <div class="ei">💸</div>
      Nenhum gasto ainda!
    </div>`;
    return;
  }

  el.innerHTML=gastos.slice(0,5).map(e=>`
    <div class="item">
      <div class="iinfo">
        <div class="idesc">${e.desc||e.cat}</div>
        <div class="imeta">${e.cat} · ${e.autor||''}</div>
      </div>
      <div class="iright">
        <div class="ival" style="color:var(--red)">${fmt(e.valor)}</div>
      </div>
    </div>
  `).join('');
}
</script>
